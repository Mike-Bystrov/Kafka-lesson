x-kafka-common: &kafka-common
  image: apache/kafka:latest
  networks:
    - kafka-net
  environment: &kafka-env
    KAFKA_PROCESS_ROLES: broker,controller
    KAFKA_LISTENERS: INTERNAL://:9092,CONTROLLER://:9093,EXTERNAL://:9094
    KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
    KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
    KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker-1:9093,2@broker-2:9093,3@broker-3:9093
    CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
    KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
    KAFKA_DEFAULT_REPLICATION_FACTOR: 3
    KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    KAFKA_HEAP_OPTS: "-Xmx256m -Xms256m"
  healthcheck:
    test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
    interval: 5s
    timeout: 10s
    retries: 15
    start_period: 20s
  restart: unless-stopped

x-consumer: &consumer
  image: test-consumer:latest
  build:
    context: .
    dockerfile: Dockerfile
    args:
      APP: consumer
  environment: &consumer-env
    KAFKA_BROKERS: broker-1:9092,broker-2:9092,broker-3:9092
    KAFKA_TOPIC: test-topic
  depends_on:
    kafka-init:
      condition: service_completed_successfully
    broker-1:
      condition: service_healthy
    broker-2:
      condition: service_healthy
    broker-3:
      condition: service_healthy
  networks:
    - kafka-net
  restart: unless-stopped

services:
  broker-1:
    <<: *kafka-common
    hostname: broker-1
    volumes:
      - broker-1-data:/tmp/kraft-combined-logs
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 1
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker-1:9092,EXTERNAL://localhost:9094
    ports:
      - "9094:9094"

  broker-2:
    <<: *kafka-common
    hostname: broker-2
    volumes:
      - broker-2-data:/tmp/kraft-combined-logs
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 2
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker-2:9092

  broker-3:
    <<: *kafka-common
    hostname: broker-3
    volumes:
      - broker-3-data:/tmp/kraft-combined-logs
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 3
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker-3:9092

  kafka-init:
    image: apache/kafka:latest
    depends_on:
      broker-1:
        condition: service_healthy
      broker-2:
        condition: service_healthy
      broker-3:
        condition: service_healthy
    networks:
      - kafka-net
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server broker-1:9092,broker-2:9092,broker-3:9092 \
          --create \
          --topic test-topic \
          --if-not-exists \
          --partitions 2 \
          --replication-factor 3

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker-1:9092,broker-2:9092,broker-3:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      broker-1:
        condition: service_healthy
      broker-2:
        condition: service_healthy
      broker-3:
        condition: service_healthy
    networks:
      - kafka-net
    restart: unless-stopped

  producer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP: producer
    environment:
      KAFKA_BROKERS: broker-1:9092,broker-2:9092,broker-3:9092
      KAFKA_TOPIC: test-topic
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks:
      - kafka-net
    restart: unless-stopped

  consumer-a-1:
    <<: *consumer
    hostname: consumer-a-1
    environment:
      <<: *consumer-env
      KAFKA_GROUP_ID: group-a
      CONSUMER_ID: consumer-a-1

  consumer-a-2:
    <<: *consumer
    hostname: consumer-a-2
    environment:
      <<: *consumer-env
      KAFKA_GROUP_ID: group-a
      CONSUMER_ID: consumer-a-2

  consumer-a-3:
    <<: *consumer
    hostname: consumer-a-3
    environment:
      <<: *consumer-env
      KAFKA_GROUP_ID: group-a
      CONSUMER_ID: consumer-a-3

  consumer-b-1:
    <<: *consumer
    hostname: consumer-b-1
    environment:
      <<: *consumer-env
      KAFKA_GROUP_ID: group-b
      CONSUMER_ID: consumer-b-1

  consumer-b-2:
    <<: *consumer
    hostname: consumer-b-2
    environment:
      <<: *consumer-env
      KAFKA_GROUP_ID: group-b
      CONSUMER_ID: consumer-b-2

  consumer-b-3:
    <<: *consumer
    hostname: consumer-b-3
    environment:
      <<: *consumer-env
      KAFKA_GROUP_ID: group-b
      CONSUMER_ID: consumer-b-3

networks:
  kafka-net:
    driver: bridge

volumes:
  broker-1-data:
  broker-2-data:
  broker-3-data:
